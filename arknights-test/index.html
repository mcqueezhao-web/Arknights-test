<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明日方舟阵营匹配测试</title>
    <style>
        @font-face {
            font-family: 'Zpix';
            src: url('./fonts/zpix.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Zpix', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif !important;
        }

        :root {
            --theme-accent: #d4af37;
            --theme-accent-rgb: 212, 175, 55;
            --theme-accent-soft: #a88a2c;
            --dynamic-bg-image: none;
            --bg-x: 0px;
            --bg-y: 0px;
            --bg-scale: 1.06;
            --logo-slot-width: 128px;
            --logo-slot-height: 128px;
        }

        body {
            background-color: #0a0a0a;
            background-image: linear-gradient(rgba(var(--theme-accent-rgb), 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(var(--theme-accent-rgb), 0.03) 1px, transparent 1px);
            background-position: center center, center center;
            background-repeat: repeat, repeat;
            background-size: 50px 50px, 50px 50px;
            background-attachment: fixed, fixed;
            min-height: 100vh;
            padding: 20px;
            color: #e8e8e8;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            text-rendering: optimizeSpeed;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: auto;
            overflow-x: hidden;
            cursor: default;
        }

        body::after {
            content: '';
            position: fixed;
            inset: -8%;
            background-image: var(--dynamic-bg-image);
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
            transform: translate3d(var(--bg-x), var(--bg-y), 0) scale(var(--bg-scale));
            transform-origin: center center;
            transition: transform 240ms ease-out;
            will-change: transform;
            z-index: -1;
            pointer-events: none;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 0;
        }

        body.bg-draggable {
            cursor: grab;
        }

        body.bg-dragging {
            cursor: grabbing;
        }

        .container {
            width: min(92vw, 780px);
            max-width: 780px;
            max-height: calc(100vh - 40px);
            margin: 0;
            background: linear-gradient(145deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 1px solid var(--theme-accent);
            border-radius: 4px;
            padding: 44px 36px;
            box-shadow:
                0 0 0 1px #0a0a0a,
                0 0 20px rgba(var(--theme-accent-rgb), 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .transparency-toggle {
            position: absolute;
            top: 14px;
            right: 14px;
            z-index: 2;
            padding: 8px 12px;
            background: rgba(10, 10, 10, 0.78);
            color: var(--theme-accent);
            border: 1px solid rgba(var(--theme-accent-rgb), 0.8);
            font-size: 12px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .transparency-toggle:hover {
            background: rgba(10, 10, 10, 0.9);
            box-shadow: 0 0 12px rgba(var(--theme-accent-rgb), 0.28);
        }

        body.ui-translucent .container {
            background: linear-gradient(145deg, rgba(26, 26, 26, 0.14) 0%, rgba(15, 15, 15, 0.14) 100%);
            box-shadow:
                0 0 0 1px rgba(10, 10, 10, 0.2),
                0 0 16px rgba(var(--theme-accent-rgb), 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        body.ui-translucent .question,
        body.ui-translucent .option,
        body.ui-translucent .result-info-card,
        body.ui-translucent .dimension-chart,
        body.ui-translucent .dimension-detail-item,
        body.ui-translucent .result-logo-slot {
            background: rgba(0, 0, 0, 0.08) !important;
            box-shadow: none !important;
        }

        body.ui-translucent .option:hover,
        body.ui-translucent .option.selected {
            background: rgba(var(--theme-accent-rgb), 0.08) !important;
        }

        body.ui-translucent::before {
            background: rgba(0, 0, 0, 0.08);
        }

        body.ui-translucent .header h1,
        body.ui-translucent .result-title,
        body.ui-translucent .result-quote,
        body.ui-translucent .progress,
        body.ui-translucent .result-info-label,
        body.ui-translucent .dimension-title,
        body.ui-translucent .dimension-score,
        body.ui-translucent .dimension-tier,
        body.ui-translucent .restart-btn,
        body.ui-translucent .transparency-toggle {
            color: rgba(var(--theme-accent-rgb), 0.1) !important;
            text-shadow: none !important;
        }

        body.ui-translucent .question,
        body.ui-translucent .option,
        body.ui-translucent .result-info-card,
        body.ui-translucent .dimension-note,
        body.ui-translucent .dimension-subtitle,
        body.ui-translucent .dimension-detail-head,
        body.ui-translucent .result-logo-placeholder {
            color: rgba(232, 232, 232, 0.1) !important;
        }

        body.ui-translucent .question {
            color: rgba(240, 240, 240, 0.1) !important;
        }

        body.ui-translucent .option {
            color: rgba(220, 220, 220, 0.1) !important;
        }

        body.ui-translucent .transparency-toggle {
            background: rgba(10, 10, 10, 0.1) !important;
            border-color: rgba(var(--theme-accent-rgb), 0.1) !important;
            box-shadow: none !important;
        }

        /* 标题区 */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(var(--theme-accent-rgb), 0.3);
        }

        .header h1 {
            font-size: 34px;
            font-weight: 700;
            color: var(--theme-accent);
            text-shadow: 0 0 10px rgba(var(--theme-accent-rgb), 0.3);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* 答题区 */
        .quiz-area {
            display: block;
        }

        .progress {
            color: var(--theme-accent);
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .question {
            font-size: 32px;
            line-height: 1.75;
            color: #f0f0f0;
            margin-bottom: 30px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.4);
            border-left: 3px solid var(--theme-accent);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            padding: 20px 22px;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(var(--theme-accent-rgb), 0.4);
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 24px;
            color: #c0c0c0;
            text-align: left;
            position: relative;
        }

        .option:hover {
            background: rgba(40, 40, 40, 0.9);
            border-color: var(--theme-accent);
            color: #f0f0f0;
        }

        .option.selected {
            background: rgba(var(--theme-accent-rgb), 0.1);
            border-color: var(--theme-accent);
            color: #f0f0f0;
            box-shadow: 0 0 10px rgba(var(--theme-accent-rgb), 0.2);
        }

        .option::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: transparent;
            transition: background 0.2s ease;
        }

        .option:hover::before,
        .option.selected::before {
            background: var(--theme-accent);
        }

        /* 结果区 */
        .result-area {
            display: none;
            text-align: center;
            padding: 12px 0 18px;
            max-height: calc(100vh - 180px);
            overflow: auto;
            cursor: default;
            scrollbar-width: thin;
            scrollbar-color: rgba(var(--theme-accent-rgb), 0.55) rgba(255, 255, 255, 0.08);
        }

        .result-area.zoomable {
            cursor: grab;
        }

        .result-area.zoomable.dragging {
            cursor: grabbing;
        }

        .result-zoom-content {
            transform-origin: top center;
            transform: translate3d(var(--result-pan-x, 0px), var(--result-pan-y, 0px), 0) scale(var(--result-zoom, 1));
            transition: transform 120ms ease-out;
        }

        .result-title {
            font-size: 28px;
            color: var(--theme-accent);
            font-weight: 700;
            margin-bottom: 14px;
            letter-spacing: 1px;
            text-shadow: 0 0 12px rgba(var(--theme-accent-rgb), 0.35);
        }

        .result-logo-slot {
            width: var(--logo-slot-width);
            height: var(--logo-slot-height);
            margin: 0 auto 14px;
            background: rgba(0, 0, 0, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .result-logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            filter: grayscale(1) contrast(1.15) brightness(1.05);
        }

        .result-logo-placeholder {
            color: var(--theme-accent-soft);
            font-size: 12px;
            letter-spacing: 1px;
        }

        .result-info-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 8px;
        }

        .result-quote {
            margin: 4px 0 16px;
            padding: 4px 10px;
            min-height: 38px;
            color: var(--theme-accent);
            font-size: 34px;
            font-weight: 700;
            line-height: 1.5;
            letter-spacing: 1.4px;
            text-align: center;
            text-shadow: 0 0 12px rgba(var(--theme-accent-rgb), 0.35);
            font-family: "Cinzel", "Trajan Pro", "Cormorant Garamond", "Times New Roman", "Noto Serif SC", "Source Han Serif SC", serif !important;
            font-variant: small-caps;
        }

        .result-info-card {
            font-size: 17px;
            line-height: 1.9;
            color: #e8e8e8;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(var(--theme-accent-rgb), 0.42);
            border-radius: 2px;
            text-align: center;
            box-shadow: inset 0 1px 0 rgba(var(--theme-accent-rgb), 0.1);
        }

        .result-info-label {
            color: var(--theme-accent);
            font-weight: 700;
            margin-right: 6px;
        }

        .dimension-chart {
            margin-top: 22px;
            padding: 18px;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(var(--theme-accent-rgb), 0.28);
        }

        .dimension-title {
            font-size: 20px;
            color: var(--theme-accent);
            letter-spacing: 1px;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .dimension-subtitle {
            font-size: 14px;
            color: #d8d8d8;
            margin-bottom: 12px;
        }

        .dimension-radar-wrap {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            aspect-ratio: 1 / 1;
        }

        .dimension-radar-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .dimension-summary {
            margin-top: 10px;
            font-size: 12px;
            line-height: 1.8;
            color: #d8d8d8;
        }

        .dimension-detail-list {
            margin-top: 14px;
            border-top: 1px solid rgba(var(--theme-accent-rgb), 0.25);
            padding-top: 10px;
            text-align: left;
        }

        .dimension-detail-item {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid rgba(var(--theme-accent-rgb), 0.45);
            background: rgba(8, 8, 8, 0.72);
            box-shadow: inset 0 1px 0 rgba(var(--theme-accent-rgb), 0.08);
        }

        .dimension-detail-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            color: #f0f0f0;
            font-size: 15px;
            margin-bottom: 6px;
        }

        .dimension-score {
            color: var(--theme-accent);
            font-weight: 700;
        }

        .dimension-tier {
            color: var(--theme-accent);
            font-size: 13px;
            margin-left: 8px;
            opacity: 0.95;
        }

        .dimension-track {
            width: 100%;
            height: 7px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(var(--theme-accent-rgb), 0.45);
            margin-bottom: 6px;
        }

        .dimension-fill {
            height: 100%;
            background: linear-gradient(90deg, rgba(var(--theme-accent-rgb), 0.95), rgba(var(--theme-accent-rgb), 0.5));
        }

        .dimension-note {
            color: #c8c8c8;
            font-size: 13px;
            line-height: 1.7;
        }

        .restart-btn {
            margin-top: 30px;
            padding: 14px 40px;
            background: transparent;
            color: var(--theme-accent);
            border: 1px solid var(--theme-accent);
            border-radius: 2px;
            font-size: 14px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .restart-btn:hover {
            background: rgba(var(--theme-accent-rgb), 0.1);
            box-shadow: 0 0 15px rgba(var(--theme-accent-rgb), 0.3);
        }

    </style>
</head>
<body>

        function validateData() {
            if (ACTIVE_QUESTION_INDEXES.length !== ACTIVE_QUESTION_COUNT) {
                throw new Error('ACTIVE_QUESTION_INDEXES 数量必须等于 ACTIVE_QUESTION_COUNT');
            }
            const indexSet = new Set(ACTIVE_QUESTION_INDEXES);
            if (indexSet.size !== ACTIVE_QUESTION_INDEXES.length) {
                throw new Error('ACTIVE_QUESTION_INDEXES 存在重复索引');
            }
            for (let i = 0; i < ACTIVE_QUESTION_INDEXES.length; i++) {
                const idx = ACTIVE_QUESTION_INDEXES[i];
                if (idx < 0 || idx >= questionBank.length) {
                    throw new Error('ACTIVE_QUESTION_INDEXES 存在越界索引: ' + idx);
                }
            }
            if (questionConfig.length !== ACTIVE_QUESTION_COUNT) {
                throw new Error('题库数量必须为' + ACTIVE_QUESTION_COUNT + '题');
            }

            const factionIdSet = new Set(factionConfig.map(f => f.id));
            const appearMap = new Map(Array.from(factionIdSet).map(id => [id, 0]));
            const dimensionCount = new Map(DIMENSION_CONFIG.map(d => [d.id, 0]));

            for (let i = 0; i < questionConfig.length; i++) {
                const q = questionConfig[i];
                if (!dimensionCount.has(q.dimensionId)) {
                    throw new Error('题目维度配置错误: ' + (i + 1));
                }
                dimensionCount.set(q.dimensionId, dimensionCount.get(q.dimensionId) + 1);

                if (!q.options || q.options.length !== 4) {
                    throw new Error('每题必须有4个选项: ' + (i + 1));
                }

                const optionFactionSet = new Set();
                for (let j = 0; j < q.options.length; j++) {
                    const opt = q.options[j];
                    if (!factionIdSet.has(opt.factionId)) {
                        throw new Error('存在无效阵营编号: ' + opt.factionId + ' (题目' + (i + 1) + ')');
                    }
                    if (optionFactionSet.has(opt.factionId)) {
                        throw new Error('同题选项阵营编号重复: 题目' + (i + 1));
                    }
                    optionFactionSet.add(opt.factionId);
                    appearMap.set(opt.factionId, appearMap.get(opt.factionId) + 1);
                    if (opt.tendency !== 'left' && opt.tendency !== 'right') {
                        throw new Error('维度倾向必须是 left 或 right: 题目' + (i + 1));
                    }
                }
            }

            // 30题完整版：要求六维严格各5题
            if (ACTIVE_QUESTION_COUNT === 30) {
                for (let i = 0; i < DIMENSION_CONFIG.length; i++) {
                    const dimId = DIMENSION_CONFIG[i].id;
                    if ((dimensionCount.get(dimId) || 0) !== 5) {
                        throw new Error('30题模式下维度题量必须为5: ' + dimId);
                    }
                }
            } else {
                // 非30题模式至少要覆盖到每个维度
                for (let i = 0; i < DIMENSION_CONFIG.length; i++) {
                    const dimId = DIMENSION_CONFIG[i].id;
                    if ((dimensionCount.get(dimId) || 0) < 2) {
                        throw new Error('当前抽题下维度覆盖不足: ' + dimId);
                    }
                }
            }

            // 允许扩展阵营暂未进入当前20题映射（如后续新增阵营）
        }

        function applyRandomBackground() {
            resetThemeAccent();
            if (!BACKGROUND_IMAGE_POOL.length) {
                document.body.style.setProperty('--dynamic-bg-image', 'none');
                return;
            }
            const randomIndex = Math.floor(Math.random() * BACKGROUND_IMAGE_POOL.length);
            const selected = BACKGROUND_IMAGE_POOL[randomIndex];
            document.body.style.setProperty('--dynamic-bg-image', 'url(\"' + selected + '\")');
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function updateBackgroundTarget() {
            bgMotionState.targetX = clamp(bgMotionState.parallaxX + bgMotionState.dragX, -BG_MOTION_CONFIG.maxDragX, BG_MOTION_CONFIG.maxDragX);
            bgMotionState.targetY = clamp(bgMotionState.parallaxY + bgMotionState.dragY, -BG_MOTION_CONFIG.maxDragY, BG_MOTION_CONFIG.maxDragY);
            document.documentElement.style.setProperty('--bg-scale', String(bgMotionState.zoom));
        }

        function animateBackgroundMotion() {
            bgMotionState.currentX += (bgMotionState.targetX - bgMotionState.currentX) * BG_MOTION_CONFIG.smooth;
            bgMotionState.currentY += (bgMotionState.targetY - bgMotionState.currentY) * BG_MOTION_CONFIG.smooth;
            document.documentElement.style.setProperty('--bg-x', bgMotionState.currentX.toFixed(2) + 'px');
            document.documentElement.style.setProperty('--bg-y', bgMotionState.currentY.toFixed(2) + 'px');
            bgMotionState.rafId = requestAnimationFrame(animateBackgroundMotion);
        }

        function initBackgroundDepthEffect() {
            bgMotionState.zoom = BG_MOTION_CONFIG.baseScale;
            updateBackgroundTarget();
            if (!bgMotionState.rafId) {
                bgMotionState.rafId = requestAnimationFrame(animateBackgroundMotion);
            }

            document.body.classList.add('bg-draggable');
            window.addEventListener('mousemove', function(e) {
                const nx = e.clientX / Math.max(1, window.innerWidth);
                const ny = e.clientY / Math.max(1, window.innerHeight);
                bgMotionState.parallaxX = (nx - 0.5) * BG_MOTION_CONFIG.maxParallaxX * 2;
                bgMotionState.parallaxY = (ny - 0.5) * BG_MOTION_CONFIG.maxParallaxY * 2;
                updateBackgroundTarget();
            });

            window.addEventListener('wheel', function(e) {
                if (e.ctrlKey) return;
                e.preventDefault();
                // 普通滚轮用于缩放背景，Shift+滚轮上下平移，Alt+滚轮左右平移
                if (e.altKey) {
                    const panDeltaX = (e.deltaY > 0 ? -1 : 1) * BG_MOTION_CONFIG.wheelPanStep;
                    bgMotionState.dragX = clamp(bgMotionState.dragX + panDeltaX, -BG_MOTION_CONFIG.maxDragX, BG_MOTION_CONFIG.maxDragX);
                } else if (e.shiftKey) {
                    const panDelta = (e.deltaY > 0 ? -1 : 1) * BG_MOTION_CONFIG.wheelPanStep;
                    bgMotionState.dragY = clamp(bgMotionState.dragY + panDelta, -BG_MOTION_CONFIG.maxDragY, BG_MOTION_CONFIG.maxDragY);
                } else {
                    const direction = e.deltaY > 0 ? -1 : 1;
                    bgMotionState.zoom = clamp(bgMotionState.zoom + direction * BG_MOTION_CONFIG.wheelStep, BG_MOTION_CONFIG.minScale, BG_MOTION_CONFIG.maxScale);
                }
                updateBackgroundTarget();
            }, { passive: false });

            window.addEventListener('mousedown', function(e) {
                if (e.button !== 0) return;
                if (e.target && e.target.closest('.option, .restart-btn, button, a, input, textarea, select, canvas')) return;
                bgMotionState.dragging = true;
                bgMotionState.dragStartX = e.clientX;
                bgMotionState.dragStartY = e.clientY;
                bgMotionState.dragOriginX = bgMotionState.dragX;
                bgMotionState.dragOriginY = bgMotionState.dragY;
                document.body.classList.add('bg-dragging');
            });

            window.addEventListener('mousemove', function(e) {
                if (!bgMotionState.dragging) return;
                const dx = e.clientX - bgMotionState.dragStartX;
                const dy = e.clientY - bgMotionState.dragStartY;
                // 横向与纵向都可直观拖动
                bgMotionState.dragX = clamp(bgMotionState.dragOriginX + dx, -BG_MOTION_CONFIG.maxDragX, BG_MOTION_CONFIG.maxDragX);
                bgMotionState.dragY = clamp(bgMotionState.dragOriginY + dy, -BG_MOTION_CONFIG.maxDragY, BG_MOTION_CONFIG.maxDragY);
                updateBackgroundTarget();
            });

            window.addEventListener('mouseup', function() {
                bgMotionState.dragging = false;
                document.body.classList.remove('bg-dragging');
            });

            window.addEventListener('mouseleave', function() {
                bgMotionState.dragging = false;
                document.body.classList.remove('bg-dragging');
            });
        }

        function applyResultZoom(nextZoom) {
            resultZoomState.value = clamp(nextZoom, resultZoomState.min, resultZoomState.max);
            if (resultZoomContent) {
                resultZoomContent.style.setProperty('--result-zoom', String(resultZoomState.value));
            }
            clampResultPan();
            if (resultArea) {
                resultArea.classList.toggle('zoomable', resultZoomState.value > 1.001);
            }
        }

        function getResultPanBounds() {
            if (!resultArea) return { x: 0, y: 0 };
            const extraX = Math.max(0, (resultZoomState.value - 1) * resultArea.clientWidth * 0.5);
            const extraY = Math.max(0, (resultZoomState.value - 1) * resultArea.clientHeight * 0.65);
            return { x: extraX, y: extraY };
        }

        function setResultPan(nextX, nextY) {
            const bounds = getResultPanBounds();
            resultZoomState.panX = clamp(nextX, -bounds.x, bounds.x);
            resultZoomState.panY = clamp(nextY, -bounds.y, bounds.y);
            if (resultZoomContent) {
                resultZoomContent.style.setProperty('--result-pan-x', resultZoomState.panX.toFixed(1) + 'px');
                resultZoomContent.style.setProperty('--result-pan-y', resultZoomState.panY.toFixed(1) + 'px');
            }
        }

        function clampResultPan() {
            setResultPan(resultZoomState.panX, resultZoomState.panY);
        }

        function initResultZoomAndPan() {
            applyResultZoom(1);
            if (!resultArea) return;
            resultArea.addEventListener('wheel', function(e) {
                if (resultArea.style.display !== 'block') return;
                if (!e.ctrlKey) return;
                e.preventDefault();
                e.stopPropagation();
                const direction = e.deltaY > 0 ? -1 : 1;
                applyResultZoom(resultZoomState.value + direction * resultZoomState.step);
            }, { passive: false });
            resultArea.addEventListener('wheel', function(e) {
                if (resultArea.style.display !== 'block') return;
                if (resultZoomState.value <= 1.001) return;
                if (e.ctrlKey) return;
                if (!e.altKey && !e.shiftKey && Math.abs(e.deltaX) < 0.5) return;
                e.preventDefault();
                e.stopPropagation();
                if (Math.abs(e.deltaX) >= 0.5) {
                    // 触控板/横向滚轮：直接左右平移
                    setResultPan(resultZoomState.panX - e.deltaX * 0.85, resultZoomState.panY);
                } else if (e.altKey) {
                    // Alt + 滚轮：左右平移
                    setResultPan(resultZoomState.panX - e.deltaY * 0.55, resultZoomState.panY);
                } else {
                    // Shift + 滚轮：上下平移
                    setResultPan(resultZoomState.panX, resultZoomState.panY - e.deltaY * 0.55);
                }
            }, { passive: false });

            resultArea.addEventListener('mousedown', function(e) {
                if (resultArea.style.display !== 'block') return;
                if (resultZoomState.value <= 1.001) return;
                if (e.button !== 0) return;
                if (e.target && e.target.closest('button, .option, a, input, textarea, select, canvas')) return;
                resultZoomState.dragging = true;
                resultZoomState.startX = e.clientX;
                resultZoomState.startY = e.clientY;
                resultZoomState.startPanX = resultZoomState.panX;
                resultZoomState.startPanY = resultZoomState.panY;
                resultArea.classList.add('dragging');
            });

            window.addEventListener('mousemove', function(e) {
                if (!resultZoomState.dragging) return;
                const dx = e.clientX - resultZoomState.startX;
                const dy = e.clientY - resultZoomState.startY;
                setResultPan(resultZoomState.startPanX + dx, resultZoomState.startPanY + dy);
            });

            window.addEventListener('mouseup', function() {
                resultZoomState.dragging = false;
                resultArea.classList.remove('dragging');
            });
        }

        function hexToRgb(hex) {
            const value = (hex || '').trim().replace('#', '');
            if (!/^[\da-fA-F]{6}$/.test(value)) return null;
            return {
                r: parseInt(value.slice(0, 2), 16),
                g: parseInt(value.slice(2, 4), 16),
                b: parseInt(value.slice(4, 6), 16)
            };
        }

        function rgbToHex(r, g, b) {
            const toHex = function(v) {
                return Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, '0');
            };
            return '#' + toHex(r) + toHex(g) + toHex(b);
        }

        function rgbToHsl(r, g, b) {
            const nr = r / 255;
            const ng = g / 255;
            const nb = b / 255;
            const max = Math.max(nr, ng, nb);
            const min = Math.min(nr, ng, nb);
            const delta = max - min;
            let h = 0;
            let s = 0;
            const l = (max + min) / 2;
            if (delta !== 0) {
                s = delta / (1 - Math.abs(2 * l - 1));
                if (max === nr) h = ((ng - nb) / delta) % 6;
                else if (max === ng) h = (nb - nr) / delta + 2;
                else h = (nr - ng) / delta + 4;
                h *= 60;
                if (h < 0) h += 360;
            }
            return { h: h, s: s, l: l };
        }

        function hslToRgb(h, s, l) {
            const c = (1 - Math.abs(2 * l - 1)) * s;
            const hh = h / 60;
            const x = c * (1 - Math.abs((hh % 2) - 1));
            let r1 = 0;
            let g1 = 0;
            let b1 = 0;
            if (hh >= 0 && hh < 1) { r1 = c; g1 = x; b1 = 0; }
            else if (hh < 2) { r1 = x; g1 = c; b1 = 0; }
            else if (hh < 3) { r1 = 0; g1 = c; b1 = x; }
            else if (hh < 4) { r1 = 0; g1 = x; b1 = c; }
            else if (hh < 5) { r1 = x; g1 = 0; b1 = c; }
            else { r1 = c; g1 = 0; b1 = x; }
            const m = l - c / 2;
            return {
                r: Math.round((r1 + m) * 255),
                g: Math.round((g1 + m) * 255),
                b: Math.round((b1 + m) * 255)
            };
        }

        function normalizeAccentColor(r, g, b) {
            const hsl = rgbToHsl(r, g, b);
            const targetS = Math.max(0.35, Math.min(0.75, hsl.s));
            const targetL = Math.max(0.45, Math.min(0.62, hsl.l));
            return hslToRgb(hsl.h, targetS, targetL);
        }

        function setThemeAccent(hexColor) {
            const parsed = hexToRgb(hexColor);
            if (!parsed) return;
            const normalized = normalizeAccentColor(parsed.r, parsed.g, parsed.b);
            const root = document.documentElement;
            root.style.setProperty('--theme-accent', rgbToHex(normalized.r, normalized.g, normalized.b));
            root.style.setProperty('--theme-accent-rgb', normalized.r + ', ' + normalized.g + ', ' + normalized.b);
            const soft = hslToRgb(rgbToHsl(normalized.r, normalized.g, normalized.b).h, 0.5, 0.38);
            root.style.setProperty('--theme-accent-soft', rgbToHex(soft.r, soft.g, soft.b));
            syncRadarStyleWithTheme();
            refreshResultLogoTint();
        }

        function resetThemeAccent() {
            setThemeAccent(DEFAULT_THEME_ACCENT);
        }

        function syncRadarStyleWithTheme() {
            const css = getComputedStyle(document.documentElement);
            const accent = (css.getPropertyValue('--theme-accent') || DEFAULT_THEME_ACCENT).trim();
            const accentRgb = (css.getPropertyValue('--theme-accent-rgb') || '212, 175, 55').trim();
            DIMENSION_RADAR_STYLE.areaFill = 'rgba(' + accentRgb + ', 0.35)';
            DIMENSION_RADAR_STYLE.areaStroke = 'rgba(' + accentRgb + ', 0.95)';
            DIMENSION_RADAR_STYLE.pointColor = accent;
        }

        function pickAccentFromImage(imagePath) {
            return new Promise(function(resolve) {
                if (!imagePath) {
                    resolve(null);
                    return;
                }
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = function() {
                    try {
                        const canvas = document.createElement('canvas');
                        const maxSide = 128;
                        const scale = Math.min(1, maxSide / Math.max(img.naturalWidth, img.naturalHeight));
                        const w = Math.max(16, Math.round(img.naturalWidth * scale));
                        const h = Math.max(16, Math.round(img.naturalHeight * scale));
                        canvas.width = w;
                        canvas.height = h;
                        const ctx = canvas.getContext('2d', { willReadFrequently: true });
                        ctx.drawImage(img, 0, 0, w, h);
                        const data = ctx.getImageData(0, 0, w, h).data;
                        let best = null;
                        let fallback = { r: 212, g: 175, b: 55, weight: -1 };
                        for (let i = 0; i < data.length; i += 16) {
                            const r = data[i];
                            const g = data[i + 1];
                            const b = data[i + 2];
                            const a = data[i + 3];
                            if (a < 140) continue;
                            const hsl = rgbToHsl(r, g, b);
                            const luminance = 0.2126 * (r / 255) + 0.7152 * (g / 255) + 0.0722 * (b / 255);
                            const chromaWeight = hsl.s * 1.8;
                            const midLightWeight = 1 - Math.abs(hsl.l - 0.52);
                            const score = chromaWeight + midLightWeight;
                            if (hsl.s >= 0.18 && hsl.l >= 0.2 && hsl.l <= 0.78 && luminance >= 0.1 && score > (best ? best.weight : -1)) {
                                best = { r: r, g: g, b: b, weight: score };
                            }
                            if (score > fallback.weight) {
                                fallback = { r: r, g: g, b: b, weight: score };
                            }
                        }
                        const selected = best || fallback;
                        resolve(rgbToHex(selected.r, selected.g, selected.b));
                    } catch (e) {
                        resolve(null);
                    }
                };
                img.onerror = function() {
                    resolve(null);
                };
                img.src = imagePath;
            });
        }

        function getThemeAccentHex() {
            const css = getComputedStyle(document.documentElement);
            return (css.getPropertyValue('--theme-accent') || DEFAULT_THEME_ACCENT).trim();
        }

        function setResultLogo(logoPath, factionName) {
            const cleanedPath = (logoPath || '').trim();
            resultLogo.dataset.logoPath = cleanedPath;
            resultLogo.dataset.factionName = (factionName || '').trim();
            if (!cleanedPath) {
                resultLogo.style.display = 'none';
                resultLogoPlaceholder.style.display = 'block';
                if (resultLogoSlot) {
                    resultLogoSlot.style.setProperty('--logo-slot-width', '128px');
                    resultLogoSlot.style.setProperty('--logo-slot-height', '128px');
                }
                return;
            }
            resultLogo.onload = function() {
                const w = resultLogo.naturalWidth || 128;
                const h = resultLogo.naturalHeight || 128;
                const ratio = w / Math.max(1, h);
                const minSide = 108;
                const maxSide = 196;
                let boxW = 128;
                let boxH = 128;
                if (ratio >= 1) {
                    boxW = maxSide;
                    boxH = Math.max(minSide, Math.round(maxSide / ratio));
                } else {
                    boxH = maxSide;
                    boxW = Math.max(minSide, Math.round(maxSide * ratio));
                }
                if (resultLogoSlot) {
                    resultLogoSlot.style.setProperty('--logo-slot-width', boxW + 'px');
                    resultLogoSlot.style.setProperty('--logo-slot-height', boxH + 'px');
                }
            };
            resultLogo.src = cleanedPath;
            resultLogo.style.display = 'block';
            resultLogoPlaceholder.style.display = 'none';
            resultLogo.style.filter = 'grayscale(1) contrast(1.15) brightness(1.05)';
        }

        function refreshResultLogoTint() {
            if (!resultArea || resultArea.style.display !== 'block') return;
            const logoPath = (resultLogo.dataset.logoPath || '').trim();
            const factionName = (resultLogo.dataset.factionName || '').trim();
            if (!logoPath) return;

        function applyFactionAssets() {

        function runLogicChecks() {
            console.assert(getFactionDistanceScore({ side: 'balanced', score: 65 }, 0) === 0, '持平映射异常');
            console.assert(getFactionDistanceScore({ side: 'left', score: 85 }, 1) < getFactionDistanceScore({ side: 'right', score: 85 }, 1), '维度方向距离判定异常');
        }

        function renderQuestion() {
            const q = questionConfig[currentQuestion];
            progress.textContent = '第 ' + (currentQuestion + 1) + ' 题 / 共 ' + questionConfig.length + ' 题';
            question.textContent = q.text;

            optionsContainer.innerHTML = '';
            for (let i = 0; i < q.options.length; i++) {
                const opt = q.options[i];

        function updateTransparencyUi() {

            transparencyToggle.textContent = isUiTranslucent ? '半透明：开' : '半透明：关';
        }

        function handleOptionClick(questionIndex, optionIndex, btnElement) {
            // 添加选中效果
            const allOptions = optionsContainer.querySelectorAll('.option');
            allOptions.forEach(opt => opt.classList.remove('selected'));
            btnElement.classList.add('selected');

            // 延迟后进入下一题，让用户看到选中效果
            setTimeout(function() {
                const selectedOption = questionConfig[questionIndex].options[optionIndex];
                const dimScore = dimensionScores[questionConfig[questionIndex].dimensionId];
                dimScore[selectedOption.tendency]++;
                if (Object.prototype.hasOwnProperty.call(factionSignalScores, selectedOption.factionId)) {
                    factionSignalScores[selectedOption.factionId]++;
                }
                currentQuestion++;
                if (currentQuestion < questionConfig.length) {
                    renderQuestion();
                } else {
                    showResult();
                }
            }, 200);
        }

        function getFactionDimensionData(faction) {
            if (!faction || !faction.profile) return null;
            const mapped = DIMENSION_CONFIG.map(function(dim) {
                const rule = faction.profile[dim.id];
                if (!rule) return null;
                const score = Math.max(SCORE_SYSTEM.min, Math.min(SCORE_SYSTEM.max, rule.score));
                let dominantLabel = dim.left;
                if (rule.side === 'right') dominantLabel = dim.right;
                if (rule.side === 'balanced') dominantLabel = dim.left + ' / ' + dim.right;
                const axisLabel = rule.side === 'balanced' ? '持平' : dominantLabel;
                return {
                    axisLabel: axisLabel,
                    dominantLabel: dominantLabel,
                    tierText: SCORE_SYSTEM.getTier(score, rule.side),
                    score: score,
                    biasValue: getRadarValue(score, rule.side)
                };
            });
            return mapped.some(function(item) { return item === null; }) ? null : mapped;
        }

        function getRadarValue(score, side) {
            if (side === 'balanced') return RADAR_SCORE_MAP.balanced;
            if (score >= 90) return RADAR_SCORE_MAP.peak;
            if (score >= 80) return RADAR_SCORE_MAP.veryHigh;
            if (score >= 70) return RADAR_SCORE_MAP.high;
            if (score >= 60) return RADAR_SCORE_MAP.mid;
            return 40;
        }

        function getFactionDistanceScore(rule, userSignedValue) {
            if (!rule) return Number.POSITIVE_INFINITY;
            if (rule.side === 'balanced') return Math.abs(userSignedValue);
            const normalized = Math.max(0, Math.min(1, (rule.score - 60) / 40));
            const targetSignedValue = rule.side === 'left' ? normalized : -normalized;
            return Math.abs(targetSignedValue - userSignedValue);
        }

        function getUserSignedDimensionValue(dimId) {
            const dim = dimensionScores[dimId] || { left: 0, right: 0 };
            const total = dim.left + dim.right;
            if (!total) return 0;
            return (dim.left - dim.right) / total;
        }

        function getBestMatchedFactionIndex() {
            let bestFactionIndex = 0;
            let bestCompositeScore = Number.POSITIVE_INFINITY;
            const signalWeight = 0.22; // 维度主导，选项阵营信号仅作二级修正防止结果过度集中
            for (let i = 0; i < factionConfig.length; i++) {
                const faction = factionConfig[i];
                if (!faction.profile) continue;
                let sumDistance = 0;
                let validDimCount = 0;
                for (let j = 0; j < DIMENSION_CONFIG.length; j++) {
                    const dimId = DIMENSION_CONFIG[j].id;
                    const rule = faction.profile[dimId];
                    if (!rule) continue;
                    const userSignedValue = getUserSignedDimensionValue(dimId);
                    sumDistance += getFactionDistanceScore(rule, userSignedValue);
                    validDimCount++;
                }
                if (!validDimCount) continue;
                const avgDistance = sumDistance / validDimCount;
                const signalRate = (factionSignalScores[faction.id] || 0) / Math.max(1, questionConfig.length);
                const compositeScore = avgDistance - signalRate * signalWeight;
                const bestFaction = factionConfig[bestFactionIndex];
                const bestSignalRate = (factionSignalScores[bestFaction.id] || 0) / Math.max(1, questionConfig.length);
                if (
                    compositeScore < bestCompositeScore ||
                    (
                        compositeScore === bestCompositeScore &&
                        (
                            signalRate > bestSignalRate ||
                            (signalRate === bestSignalRate && faction.id < bestFaction.id)
                        )
                    )
                ) {
                    bestCompositeScore = compositeScore;
                    bestFactionIndex = i;
                }
            }
            return bestFactionIndex;
        }

        function getAnswerBasedDimensionData() {
            return DIMENSION_CONFIG.map(function(dim) {
                const score = dimensionScores[dim.id];
                const total = score.left + score.right || 1;
                const leftRate = Math.round((score.left / total) * 100);
                const rightRate = 100 - leftRate;
                const diff = Math.abs(leftRate - rightRate);
                const side = leftRate === rightRate ? 'balanced' : (leftRate > rightRate ? 'left' : 'right');
                const dominantLabel = side === 'balanced' ? (dim.left + ' / ' + dim.right) : (side === 'left' ? dim.left : dim.right);
                const pseudoScore = Math.round((diff / 100) * 40) + 60;
                const axisLabel = side === 'balanced' ? '持平' : dominantLabel;
                return {
                    axisLabel: axisLabel,
                    dominantLabel: dominantLabel,
                    tierText: SCORE_SYSTEM.getTier(pseudoScore, side),
                    score: pseudoScore,
                    biasValue: getRadarValue(pseudoScore, side)
                };
            });
        }

        function renderDimensionChart(faction) {
            const radarData = getFactionDimensionData(faction) || getAnswerBasedDimensionData();
            const detailHtml = DIMENSION_CONFIG.map(function(dim, i) {
                const item = radarData[i];
                const customText = faction && (
                    (FACTION_DIMENSION_ANALYSIS[faction.id] && FACTION_DIMENSION_ANALYSIS[faction.id][dim.id]) ||
                    (faction.dimensionAnalysis && faction.dimensionAnalysis[dim.id])
                );
                const noteText = customText || ('倾向：' + item.dominantLabel + '。该维度表现为' + item.tierText + '水平。');
                const tierWithDirection = item.dominantLabel + item.tierText;
                return (
                    '<div class="dimension-detail-item">' +
                        '<div class="dimension-detail-head">' +
                            '<span>' + dim.label + '<span class="dimension-tier">' + tierWithDirection + '</span></span>' +
                            '<span class="dimension-score">' + item.score + '分</span>' +
                        '</div>' +
                        '<div class="dimension-track"><div class="dimension-fill" style="width:' + item.score + '%"></div></div>' +
                        '<div class="dimension-note">' + noteText + '</div>' +
                    '</div>'
                );
            }).join('');

            dimensionChart.innerHTML =
                '<div class="dimension-title">维度分析</div>' +
                '<div class="dimension-subtitle">六维人格倾向图（雷达）</div>' +
                '<div class="dimension-radar-wrap"><canvas id="dimensionRadarCanvas" class="dimension-radar-canvas"></canvas></div>' +
                '<div class="dimension-detail-list">' + detailHtml + '</div>';

            drawDimensionRadar('dimensionRadarCanvas', radarData);
        }

        function drawDimensionRadar(canvasId, radarData) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            syncRadarStyleWithTheme();
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const box = canvas.getBoundingClientRect();
            const size = Math.max(260, Math.min(box.width || 0, box.height || 0));
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size * 0.33;
            const labelRadius = radius + 28;
            const count = radarData.length;
            const startAngle = -Math.PI / 2;

            canvas.width = size * dpr;
            canvas.height = size * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, size, size);

            for (let level = 1; level <= DIMENSION_RADAR_STYLE.levels; level++) {
                const levelRadius = (radius * level) / DIMENSION_RADAR_STYLE.levels;
                ctx.beginPath();
                for (let i = 0; i < count; i++) {
                    const angle = startAngle + (i * Math.PI * 2) / count;
                    const x = centerX + Math.cos(angle) * levelRadius;
                    const y = centerY + Math.sin(angle) * levelRadius;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.strokeStyle = DIMENSION_RADAR_STYLE.gridColor;
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            ctx.font = '18px "Noto Sans SC", sans-serif';
            ctx.fillStyle = DIMENSION_RADAR_STYLE.labelColor;
            for (let i = 0; i < count; i++) {
                const angle = startAngle + (i * Math.PI * 2) / count;
                const axisX = centerX + Math.cos(angle) * radius;
                const axisY = centerY + Math.sin(angle) * radius;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(axisX, axisY);
                ctx.strokeStyle = DIMENSION_RADAR_STYLE.axisColor;
                ctx.lineWidth = 1;
                ctx.stroke();

                const labelX = centerX + Math.cos(angle) * labelRadius;
                const labelY = centerY + Math.sin(angle) * labelRadius;
                const label = radarData[i].axisLabel;
                const textWidth = ctx.measureText(label).width;
                ctx.fillText(label, labelX - textWidth / 2, labelY + 5);
            }

            ctx.beginPath();
            for (let i = 0; i < count; i++) {
                const angle = startAngle + (i * Math.PI * 2) / count;
                const valueRadius = (radarData[i].biasValue / 100) * radius;
                const x = centerX + Math.cos(angle) * valueRadius;
                const y = centerY + Math.sin(angle) * valueRadius;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fillStyle = DIMENSION_RADAR_STYLE.areaFill;
            ctx.fill();
            ctx.strokeStyle = DIMENSION_RADAR_STYLE.areaStroke;
            ctx.lineWidth = 2;
            ctx.stroke();

            for (let i = 0; i < count; i++) {
                const angle = startAngle + (i * Math.PI * 2) / count;
                const valueRadius = (radarData[i].biasValue / 100) * radius;
                const x = centerX + Math.cos(angle) * valueRadius;
                const y = centerY + Math.sin(angle) * valueRadius;
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fillStyle = DIMENSION_RADAR_STYLE.pointColor;
                ctx.fill();
            }
        }

        function showResult() {
            const resultFaction = getBestMatchedFactionIndex();
            const faction = factionConfig[resultFaction];
            if (!faction) {
                throw new Error('结果阵营编号无效: ' + resultFaction);
            }

            resultTitle.textContent = '你的匹配阵营：' + faction.name;
            const rawSlogan = FACTION_SLOGAN_MAP[faction.name] || '';
            const quotedMatch = rawSlogan.match(/“[^”]*”/);
            resultQuote.textContent = quotedMatch ? quotedMatch[0] : rawSlogan;
            factionTrait.innerHTML = '<span class="result-info-label">阵营特征：</span>' + (faction.desc || '');
            userTrait.innerHTML = '<span class="result-info-label">用户结果特征：</span>' + (faction.userResultFeature || '');

            const logoPath = (faction.logo || faction.image || '').trim();

            if (faction.resultBackground && faction.resultBackground.trim() !== '') {
                document.body.style.setProperty('--dynamic-bg-image', 'url(\"' + faction.resultBackground + '\")');
                const mappedThemeColor = FACTION_THEME_COLOR_MAP[faction.name];
                if (mappedThemeColor) {
                    setThemeAccent(mappedThemeColor);
                } else {
                    resetThemeAccent();
                    pickAccentFromImage(faction.resultBackground).then(function(colorHex) {
                        if (colorHex) {
                            setThemeAccent(colorHex);
                            renderDimensionChart(faction);
                        }
                    });
                }
            } else {
                resetThemeAccent();
            }
            setResultLogo(logoPath, faction.name);

            quizArea.style.display = 'none';
            resultArea.style.display = 'block';
            applyResultZoom(resultZoomState.value);
            renderDimensionChart(faction);
        }

        applyFactionAssets();
        validateData();
        runLogicChecks();
        resetThemeAccent();
        initBackgroundDepthEffect();
        initResultZoomAndPan();
        if (transparencyToggle) {
            transparencyToggle.addEventListener('click', toggleUiTransparency);
            updateTransparencyUi();
        }
        applyRandomBackground();
        renderQuestion();
    </script>
</body>
</html>
